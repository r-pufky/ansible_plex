---
###############################################################################
# Restore
###############################################################################
# Test a restore operation works correctly.
#
# Tests:
# * Backup tasks is successful (DB backed up locally).
# * DB restored from backup successfully.
# * Service is validated.
# * Test only required when backup or restore is modified.

dependency:
  name: 'galaxy'
driver:
  name: 'podman'
provisioner:
  name: 'ansible'
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
    ssh_connection:
      pipelining: false
  inventory:
    group_vars:
      all:
        url_inject_enable: true
        plex_flg_preferences: true
        test_variable: 'TEST'
        plex_cfg_preferences: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~
            "/molecule/files/Preferences.xml"
          }}'
        plex_cfg_backup_dir: '/tmp/ansible_plex_test'
platforms:
  - name: 'plex_restore'
    image: 'ghcr.io/hifis-net/debian-systemd:13'
    systemd: 'always'
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:ro'
    command: '/lib/systemd/systemd'
    pre_build_image: true
verifier:
  name: 'ansible'
lint: |
  set -e
  yamllint .
  ansible-lint .
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'verify'
    - 'destroy'
