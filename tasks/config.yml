---
###############################################################################
# Configure Plex Install
###############################################################################
# Plex reads/re-writes only once at startup. Saving in the WebUI will write
# current running config to disk.
#
# Plex copies  existing values and generates the following if missing:
# * IPNetworkType
# * OldestPreviousVersion
# * MachineIdentifier
# * ProcessedMachineIdentifier
# * AnonymousMachineIdentifier

- name: 'Config | filesystem | set Preferences.xml'
  when: plex_flg_preferences
  ansible.builtin.template:
    src: '{{ plex__cfg._preferences }}'
    dest: '{{ plex___app._cfg }}'
    owner: '{{ plex__cfg._uid }}'
    group: '{{ plex__cfg._gid }}'
    mode: '0600'
  become: true
  become_user: '{{ plex__srv._user }}'

# Always enable and reload as this is the first time the service is touched
# after install step.
- name: 'Config | systemd | start plexmediaserver.service'
  when: plex_flg_start
  ansible.builtin.systemd:
    name: 'plexmediaserver.service'
    enabled: true
    daemon_reload: true
    state: 'started'
  failed_when: false
