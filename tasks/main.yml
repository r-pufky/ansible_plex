---
- name: 'Prep'
  ansible.builtin.import_tasks: 'prep.yml'

- name: 'Backup'
  when: plex_flg_backup
  ansible.builtin.import_tasks: 'backup.yml'

- name: 'Restore'
  when: plex_flg_restore
  ansible.builtin.import_tasks: 'restore.yml'

- name: 'Maintenance'
  when: plex_flg_maintenance
  ansible.builtin.import_tasks: 'maintenance.yml'

- name: 'Install'
  when: plex_flg_install
  ansible.builtin.import_tasks: 'install.yml'

- name: 'Config'
  when: plex_flg_config
  ansible.builtin.import_tasks: 'config.yml'

- name: 'Auto update'
  ansible.builtin.import_tasks: 'auto_update.yml'

- name: 'DB repair'
  ansible.builtin.import_tasks: 'db_repair.yml'

- name: 'Start'
  ansible.builtin.import_tasks: 'start.yml'
