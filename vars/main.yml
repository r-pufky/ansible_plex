---
###############################################################################
# Plex Role Options
###############################################################################
# Use Debian package for installation.
#
# Updates:
# * Branch for new Debian releases.
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://forums.plex.tv/t/plex-media-server/30447

plex___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-14',
    _debian='trixie',
    _app='1.43.0.10492',
  ) }}"

###############################################################################
# APT Packages
###############################################################################
# Obtained from manual package install. Plex 1.43.0.10467 changed APT
# repository to a new location with updated keys to attempt to fix key signing
# issues and old package issues. See install.yml.
#
# Reference:
# * https://repo.plex.tv/scripts/setupRepo.sh
# * https://support.plex.tv/articles/200288586-installation/

plex___packages:
  - 'curl'  # plexupdate, dbrepair script.
  - 'plexmediaserver'
  - 'xmlstarlet'  # Bash XML parsing for auto update.

plex___apt_sources:
  - name: 'plexmediaserver'
    types:
      - 'deb'
    uris: 'https://repo.plex.tv/deb'
    suites:
      - 'public'
    components:
      - 'main'
    signed_by: 'https://downloads.plex.tv/plex-keys/PlexSign.v2.key'

###############################################################################
# Plex
###############################################################################

plex___app: "{{ {} | r_pufky.data.v3(

    _bin_dir='/usr/local/bin',
    _drop_in='/etc/systemd/system/plexmediaserver.service.d/override.conf',
    _opt_dir='/opt/plex',
    _live_dir='/var/lib/plexmediaserver/Library/Application Support',
    _root_dir=(
      '/var/lib/plexmediaserver/Library/Application Support/' ~
      'Plex Media Server'
    ),
    _db_dir=(
      '/var/lib/plexmediaserver/Library/Application Support/' ~
      'Plex Media Server/Plug-in Support/Databases'
    ),
    _cfg=(
      '/var/lib/plexmediaserver/Library/Application Support/' ~
      'Plex Media Server/Preferences.xml'
    ),
  ) }}"

###############################################################################
# plex_update
###############################################################################
# Configure entitlements if configured and check for/apply new updates. Role
# uses a heavily inspired version from reference.
#
# Reference:
# * https://github.com/mrworf/plexupdate

plex___update_package: 'plex_update'

plex___update: "{{ {} | r_pufky.data.v3(

    _package=plex___repair_package,
    _dest_file=plex___app._opt_dir ~ '/' ~ plex___update_package,
  ) }}"

###############################################################################
# DBRepair.sh
###############################################################################
# Database maintenance script.
#
# Reference:
# * https://github.com/ChuckPa/DBRepair

plex___repair_repo_url:
  'https://github.com/ChuckPa/PlexDBRepair/releases/latest/download/'
plex___repair_package: 'DBRepair.sh'

plex___repair: "{{ {} | r_pufky.data.v3(

    _package=plex___repair_package,
    _dest_file=plex___app._opt_dir ~ '/' ~ plex___repair_package,
    _url=plex___repair_repo_url ~ plex___repair_package,
  ) }}"

###############################################################################
# Default Plex User/Group
###############################################################################

plex___group:
  name: 'media'
  gid: 5555

plex___user:
  name: 'media'
  group: 'media'
  uid: 5555
  shell: '/usr/sbin/nologin'
  home: '/nonexistent'
  create_home: false
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
